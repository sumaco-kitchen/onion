<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玉ねぎ発注カレンダー</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #181816;
  color: #e4e0d4;
  min-height: 100vh;
  padding: 20px 12px 60px;
}

header { margin-bottom: 16px; }
header h1 {
  font-size: 11px;
  letter-spacing: 0.18em;
  color: #c8a84b;
  text-transform: uppercase;
  margin-bottom: 2px;
}
header p { font-size: 10px; color: #5a5a52; }

.month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.month-nav button {
  background: #242420;
  border: 1px solid #333;
  border-radius: 5px;
  color: #a0a098;
  cursor: pointer;
  font-size: 15px;
  padding: 6px 16px;
  transition: all 0.15s;
}
.month-nav button:hover { border-color: #c8a84b; color: #c8a84b; }
.month-label {
  font-size: 14px;
  color: #c8a84b;
  font-weight: 700;
  letter-spacing: 0.06em;
}

.cal-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  margin-bottom: 3px;
}
.cal-header span {
  text-align: center;
  font-size: 10px;
  color: #5a5a52;
  font-weight: 700;
  padding: 3px 0;
}
.cal-header .h-sun { color: #5a3232; }
.cal-header .h-sat { color: #324050; }

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  margin-bottom: 12px;
}

.day-cell {
  background: #222220;
  border: 1px solid #2c2c28;
  border-radius: 5px;
  padding: 6px 4px 7px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-height: 108px;
}
.day-cell.today { border-color: #c8a84b; }
.day-cell.is-sun { background: #1e1c1c; }
.day-cell.empty {
  background: transparent;
  border-color: transparent;
  pointer-events: none;
}

.day-date {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: #908c80;
  line-height: 1;
  align-self: flex-start;
  padding-left: 2px;
}
.day-cell.today .day-date { color: #e8c96d; }
.day-cell.is-sun .day-date { color: #6a4040; }

.picker-wrap {
  position: relative;
  width: 100%;
  height: 28px;
  overflow: hidden;
  border-radius: 5px;
  border: 1px solid #303028;
  background: #161614;
  cursor: ns-resize;
  user-select: none;
  touch-action: none;
}
.picker-wrap.focused { border-color: #c8a84b; }
.picker-list {
  position: absolute;
  width: 100%;
  transition: transform 0.12s ease-out;
}
.picker-item {
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: transparent;
  white-space: nowrap;
  font-weight: 500;
}
.picker-item.selected {
  color: #ffffff;
  font-size: 15px;
}

.tag {
  font-size: 8px;
  border-radius: 3px;
  padding: 1px 4px;
  font-weight: 700;
  white-space: nowrap;
}
.tag-plus   { background: #192818; color: #6bc87a; }
.tag-minus  { background: #281918; color: #c87a6a; }
.tag-double { background: #18202a; color: #7aaac8; }

.order-badge {
  display: none;
  flex-direction: column;
  align-items: center;
  background: #28200e;
  border: 1px solid #504020;
  border-radius: 4px;
  padding: 3px 4px 2px;
  width: 100%;
  margin-top: auto;
}
.order-badge.on { display: flex; }
.order-num {
  font-family: 'DM Mono', monospace;
  font-size: 20px;
  font-weight: 500;
  color: #e8c96d;
  line-height: 1;
}
.order-unit { font-size: 8px; color: #8a7050; }

.sun-label {
  font-size: 9px;
  color: #3a3030;
  margin-top: auto;
}

#calc-btn {
  background: #c8a84b;
  border: none;
  border-radius: 6px;
  color: #14100a;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 13px;
  width: 100%;
  transition: background 0.15s;
  margin-bottom: 14px;
}
#calc-btn:hover { background: #e8c96d; }

.summary {
  background: #222220;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 16px;
  display: none;
}
.summary.on { display: block; }
.sum-title {
  font-size: 10px;
  letter-spacing: 0.14em;
  color: #c8a84b;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid #333;
}
.sum-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 5px 0;
  border-bottom: 1px solid #252520;
  gap: 6px;
  font-size: 12px;
}
.sum-day  { color: #a0a098; white-space: nowrap; min-width: 64px; }
.sum-note { color: #4e4e48; font-size: 10px; flex: 1; }
.sum-val  {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  color: #e8c96d;
  white-space: nowrap;
}
.sum-val-u { font-size: 10px; color: #8a7050; }
.sum-total {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-top: 12px;
}
.sum-total-label { font-size: 11px; color: #c8a84b; }
.sum-total-num {
  font-family: 'DM Mono', monospace;
  font-size: 36px;
  color: #e8c96d;
}
.sum-total-u { font-size: 14px; color: #8a7050; }
</style>
</head>
<body>

<header>
  <h1>🧅 玉ねぎ発注カレンダー</h1>
  <p>製造予定量をスクロールで選択 → ダブルタップで次へ → 一括計算</p>
</header>

<div class="month-nav">
  <button onclick="shiftMonth(-1)">◀</button>
  <span class="month-label" id="month-label"></span>
  <button onclick="shiftMonth(1)">▶</button>
</div>

<div class="cal-header">
  <span>月</span><span>火</span><span>水</span><span>木</span><span>金</span>
  <span class="h-sat">土</span><span class="h-sun">日</span>
</div>
<div class="calendar" id="calendar"></div>

<button id="calc-btn" onclick="calculate()">発注袋数を一括計算する</button>
<div class="summary" id="summary"></div>

<script>
const DAY = ['日','月','火','水','木','金','土'];
const OPTIONS = [0, 15, 20, 25, 30, 35, 40, 45, 50, 55];
const ITEM_H = 28;
const DEFAULT_IDX = 0;
const STORAGE_KEY = 'onion-prod-values';
const STORAGE_MONTH_KEY = 'onion-month-offset';

let monthOffset = 0;
let prodValues = {};
let inputOrder = [];

// ---- localStorage 読み込み ----
function loadStorage() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) prodValues = JSON.parse(saved);
    const savedMonth = localStorage.getItem(STORAGE_MONTH_KEY);
    if (savedMonth !== null) monthOffset = parseInt(savedMonth);
  } catch(e) {}
}

function saveStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(prodValues));
    localStorage.setItem(STORAGE_MONTH_KEY, String(monthOffset));
  } catch(e) {}
}

function toKey(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function shiftMonth(dir) {
  monthOffset += dir;
  saveStorage();
  render();
}

function getRule(date) {
  const dow = date.getDay();
  if (dow === 0) return null;
  const n1 = new Date(date); n1.setDate(date.getDate()+1);
  const n2 = new Date(date); n2.setDate(date.getDate()+2);
  if (dow === 6) return { targets:[n1,n2], correction:-2, corrLabel:'賞味期限調整 −2袋' };
  if (dow === 1) return { targets:[n1],    correction:+2, corrLabel:'バッファ +2袋' };
  return { targets:[n1], correction:0, corrLabel:null };
}

function calcBags(date) {
  const rule = getRule(date);
  if (!rule) return null;
  let totalKg = 0;
  rule.targets.forEach(t => { totalKg += prodValues[toKey(t)] || 0; });
  const base  = (totalKg / 5) * 2;
  const final = Math.max(0, base + rule.correction);
  return { final, base, totalKg, rule };
}

function createPicker(key) {
  const wrap = document.createElement('div');
  wrap.className = 'picker-wrap';
  wrap.dataset.key = key;

  const list = document.createElement('div');
  list.className = 'picker-list';

  OPTIONS.forEach((v, i) => {
    const el = document.createElement('div');
    el.className = 'picker-item';
    el.textContent = v === 0 ? '—' : v + 'kg';
    el.dataset.idx = i;
    list.appendChild(el);
  });

  wrap.appendChild(list);

  const savedVal = prodValues[key] || 0;
  let currentIdx = OPTIONS.indexOf(savedVal);
  if (currentIdx < 0) currentIdx = DEFAULT_IDX;

  function setIndex(idx, animated) {
    idx = Math.max(0, Math.min(OPTIONS.length - 1, idx));
    currentIdx = idx;
    const offset = -idx * ITEM_H;
    list.style.transition = animated ? 'transform 0.15s ease-out' : 'none';
    list.style.transform = `translateY(${offset}px)`;
    list.querySelectorAll('.picker-item').forEach(el => {
      el.classList.toggle('selected', parseInt(el.dataset.idx) === idx);
    });
    prodValues[key] = OPTIONS[idx];
    saveStorage(); // 変更のたびに保存
  }

  setIndex(currentIdx, false);

  function confirm() {
    const idx = inputOrder.indexOf(wrap);
    if (idx >= 0 && idx < inputOrder.length - 1) {
      inputOrder[idx + 1].focus();
    }
  }

  let startY = 0, startIdx = 0, dragging = false, lastY = 0, velY = 0, lastTime = 0;
  let lastTapTime = 0;

  function onStart(y) {
    dragging = true; startY = y; startIdx = currentIdx;
    lastY = y; velY = 0; lastTime = Date.now();
    wrap.classList.add('focused');
  }
  function onMove(y) {
    if (!dragging) return;
    const now = Date.now();
    velY = (y - lastY) / (now - lastTime + 1);
    lastY = y; lastTime = now;
    const delta = Math.round((startY - y) / ITEM_H);
    setIndex(startIdx + delta, false);
  }
  function onEnd() {
    if (!dragging) return;
    dragging = false;
    const drift = Math.round(-velY * 3);
    setIndex(currentIdx + drift, true);
  }

  wrap.addEventListener('touchstart', e => {
    const now = Date.now();
    if (now - lastTapTime < 300) { confirm(); lastTapTime = 0; return; }
    lastTapTime = now;
    onStart(e.touches[0].clientY);
  }, {passive: true});
  wrap.addEventListener('touchmove', e => {
    onMove(e.touches[0].clientY); e.preventDefault();
  }, {passive: false});
  wrap.addEventListener('touchend', () => onEnd());

  let dblClickGuard = 0;
  wrap.addEventListener('mousedown', e => {
    const now = Date.now();
    if (now - dblClickGuard < 300) { confirm(); dblClickGuard = 0; return; }
    dblClickGuard = now;
    onStart(e.clientY); e.preventDefault();
  });
  window.addEventListener('mousemove', e => { if (dragging) onMove(e.clientY); });
  window.addEventListener('mouseup',   () => { if (dragging) onEnd(); });

  wrap.addEventListener('wheel', e => {
    e.preventDefault();
    setIndex(currentIdx + (e.deltaY > 0 ? 1 : -1), true);
  }, {passive: false});

  wrap.tabIndex = 0;
  wrap.addEventListener('focus', () => wrap.classList.add('focused'));
  wrap.addEventListener('blur',  () => wrap.classList.remove('focused'));
  wrap.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp')   { e.preventDefault(); setIndex(currentIdx - 1, true); }
    if (e.key === 'ArrowDown') { e.preventDefault(); setIndex(currentIdx + 1, true); }
    if (e.key === 'Enter')     { e.preventDefault(); confirm(); }
  });

  return wrap;
}

function render() {
  const today = new Date(); today.setHours(0,0,0,0);
  const refDate = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
  const y = refDate.getFullYear();
  const m = refDate.getMonth();
  const firstDay = new Date(y, m, 1);
  const lastDay  = new Date(y, m+1, 0);

  document.getElementById('month-label').textContent = `${y}年 ${m+1}月`;

  const startDow = firstDay.getDay();
  const offset   = startDow === 0 ? 6 : startDow - 1;

  const cal = document.getElementById('calendar');
  cal.innerHTML = '';
  inputOrder = [];

  for (let i = 0; i < offset; i++) {
    const el = document.createElement('div');
    el.className = 'day-cell empty';
    cal.appendChild(el);
  }

  const cur = new Date(firstDay);
  while (cur <= lastDay) {
    const d   = new Date(cur);
    const key = toKey(d);
    const dow = d.getDay();
    const isToday = d.getTime() === today.getTime();
    const isSun   = dow === 0;

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isToday?' today':'') + (isSun?' is-sun':'');

    const dateEl = document.createElement('div');
    dateEl.className = 'day-date';
    dateEl.textContent = d.getDate();
    cell.appendChild(dateEl);

    const picker = createPicker(key);
    cell.appendChild(picker);
    inputOrder.push(picker);

    if (isSun) {
      const lbl = document.createElement('div');
      lbl.className = 'sun-label';
      lbl.textContent = '発注なし';
      cell.appendChild(lbl);
    } else {
      if (dow === 1) {
        const t = document.createElement('div');
        t.className = 'tag tag-plus';
        t.textContent = '+2袋';
        cell.appendChild(t);
      }
      if (dow === 6) {
        const t1 = document.createElement('div');
        t1.className = 'tag tag-double';
        t1.textContent = '日＋月';
        cell.appendChild(t1);
        const t2 = document.createElement('div');
        t2.className = 'tag tag-minus';
        t2.textContent = '−2袋';
        cell.appendChild(t2);
      }
      const badge = document.createElement('div');
      badge.className = 'order-badge';
      badge.id = 'badge-' + key;
      badge.innerHTML = '<span class="order-num"></span><span class="order-unit">袋</span>';
      cell.appendChild(badge);
    }

    cal.appendChild(cell);
    cur.setDate(cur.getDate() + 1);
  }

  const total = offset + lastDay.getDate();
  const rem = total % 7;
  if (rem !== 0) {
    for (let i = 0; i < 7 - rem; i++) {
      const el = document.createElement('div');
      el.className = 'day-cell empty';
      cal.appendChild(el);
    }
  }

  document.getElementById('summary').className = 'summary';
  document.getElementById('summary').innerHTML = '';
}

function calculate() {
  const today = new Date(); today.setHours(0,0,0,0);
  const refDate = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
  const y = refDate.getFullYear();
  const m = refDate.getMonth();
  const firstDay = new Date(y, m, 1);
  const lastDay  = new Date(y, m+1, 0);

  const rows = [];
  const cur = new Date(firstDay);

  while (cur <= lastDay) {
    const key    = toKey(cur);
    const result = calcBags(cur);

    if (result) {
      const { final, base, totalKg, rule } = result;
      const badge = document.getElementById('badge-' + key);

      if (totalKg > 0 || rule.correction !== 0) {
        if (badge) {
          badge.querySelector('.order-num').textContent = final;
          badge.className = 'order-badge on';
        }
        const dow = cur.getDay();
        const targetLabels = rule.targets.map(t =>
          `${t.getMonth()+1}/${t.getDate()}(${DAY[t.getDay()]})`
        ).join('＋');
        let note = `${targetLabels} 製造${totalKg}kg`;
        if (rule.corrLabel) note += `　${rule.corrLabel}`;
        rows.push({ dayLabel:`${m+1}/${cur.getDate()}(${DAY[dow]})`, note, final });
      } else {
        if (badge) { badge.querySelector('.order-num').textContent=''; badge.className='order-badge'; }
      }
    }
    cur.setDate(cur.getDate() + 1);
  }

  saveStorage();

  const sum = document.getElementById('summary');
  if (rows.length === 0) { sum.className='summary'; return; }

  const total = rows.reduce((a,r) => a + r.final, 0);
  sum.innerHTML = `
    <div class="sum-title">発注サマリー（${y}年${m+1}月）</div>
    ${rows.map(r => `
      <div class="sum-row">
        <span class="sum-day">${r.dayLabel}</span>
        <span class="sum-note">${r.note}</span>
        <span class="sum-val">${r.final}<span class="sum-val-u"> 袋</span></span>
      </div>
    `).join('')}
    <div class="sum-total">
      <span class="sum-total-label">月間合計</span>
      <span><span class="sum-total-num">${total}</span><span class="sum-total-u"> 袋</span></span>
    </div>
  `;
  sum.className = 'summary on';
  sum.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

// 起動時にデータ復元
loadStorage();
render();
</script>
</body>
</html>
